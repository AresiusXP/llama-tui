version: 2

project_name: llama-tui

before:
  hooks:
    - go mod tidy

builds:
  - id: llama-tui
    main: .
    binary: llama-tui
    ldflags:
      - -s -w -X github.com/AresiusXP/llama-tui/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "llama-tui_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Version}}"

homebrew_casks:
  - name: llama-tui
    homepage: "https://github.com/AresiusXP/llama-tui"
    description: "A TUI for managing and running local LLM models via llama-server"
    binaries:
      - llama-tui
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/llama-tui"]
          end
    url:
      verified: "github.com/AresiusXP/llama-tui/"
    repository:
      owner: AresiusXP
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
